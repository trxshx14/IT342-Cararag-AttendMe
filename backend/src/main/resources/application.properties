
spring.application.name=AttendMe

server.port=8888

spring.datasource.url=jdbc:mysql://localhost:3306/attendme_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024AttendanceSystemMustBeLongEnough
jwt.expiration=86400000
jwt.refresh.expiration=604800000


logging.level.org.springframework.web=INFO
logging.level.edu.cit.cararag.attendme=DEBUG

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE